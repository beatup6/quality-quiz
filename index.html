<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>품질 교육 평가 시스템</title>
<style>
  :root{
    --navy:#1B3A5B; --navy-d:#12283F; --teal:#1B9AAA; --teal-l:#E7F4F6;
    --amber:#F2A007; --amber-l:#FDF1D9; --red:#C0392B; --green:#1E7B4F;
    --ink:#1F2933; --gray:#5A6672; --lgray:#F4F6F8; --line:#E3E8EC; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif;color:var(--ink);
    background:var(--lgray);line-height:1.5;-webkit-font-smoothing:antialiased}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-size:15px}
  input,select,textarea{font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--line);
    border-radius:8px;width:100%;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);border-color:var(--teal)}
  label{display:block;font-size:13px;font-weight:700;color:var(--navy);margin:14px 0 5px}
  .btn{background:var(--teal);color:#fff;padding:11px 18px;font-weight:700}
  .btn:hover{background:#158090}
  .btn-navy{background:var(--navy)} .btn-navy:hover{background:var(--navy-d)}
  .btn-amber{background:var(--amber);color:#5a3d00} .btn-amber:hover{filter:brightness(.95)}
  .btn-red{background:var(--red)} .btn-red:hover{filter:brightness(.92)}
  .btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--lgray)}
  .btn-sm{padding:6px 12px;font-size:13px;border-radius:6px}
  .full{width:100%}
  /* ---- 로그인 ---- */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-d) 100%)}
  .auth-card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:420px;
    box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .auth-card h1{font-size:22px;color:var(--navy);margin-bottom:4px}
  .auth-card .sub{font-size:13px;color:var(--gray);margin-bottom:22px}
  .tabs{display:flex;gap:8px;margin-bottom:8px}
  .tab{flex:1;padding:9px;text-align:center;border-radius:8px;background:var(--lgray);
    color:var(--gray);font-weight:700;font-size:14px}
  .tab.active{background:var(--teal-l);color:var(--teal)}
  .msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:12px}
  .msg.err{background:#FBEAE8;color:var(--red)}
  .msg.ok{background:#E7F6EE;color:var(--green)}
  .hint{font-size:12px;color:var(--gray);margin-top:6px}
  /* ---- 앱 셸 ---- */
  header.top{background:var(--navy);color:#fff;padding:14px 22px;display:flex;align-items:center;
    justify-content:space-between;position:sticky;top:0;z-index:20;flex-wrap:wrap;gap:10px}
  header.top .brand{font-weight:700;font-size:17px}
  header.top .who{font-size:13px;color:#C6D5E2}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-left:6px}
  .badge.admin{background:var(--amber);color:#5a3d00}
  .badge.user{background:var(--teal);color:#fff}
  .container{max-width:900px;margin:0 auto;padding:22px 18px 60px}
  .card{background:#fff;border-radius:12px;border:1px solid var(--line);padding:22px;margin-bottom:18px}
  .card h2{font-size:18px;color:var(--navy);margin-bottom:4px}
  .card .desc{font-size:13px;color:var(--gray);margin-bottom:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .navbtns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .navbtns .tab{cursor:pointer;padding:9px 16px;flex:none}
  /* ---- 문항 ---- */
  .part-head{background:var(--navy);color:#fff;padding:11px 16px;border-radius:8px;margin:22px 0 14px;
    font-weight:700;font-size:15px;display:flex;justify-content:space-between;align-items:center}
  .part-head .pts{font-size:12px;color:#C6D5E2;font-weight:400}
  .q{padding:16px 0;border-bottom:1px solid var(--line)}
  .q:last-child{border-bottom:none}
  .q .stem{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:10px}
  .q .stem .qno{color:var(--navy)}
  .q .pt{font-size:12px;color:var(--gray);font-weight:400;margin-left:6px}
  .opt{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border:1px solid var(--line);
    border-radius:8px;margin-bottom:7px;cursor:pointer;font-size:14px;transition:.12s}
  .opt:hover{background:var(--lgray)}
  .opt.sel{background:var(--teal-l);border-color:var(--teal)}
  .opt input{width:auto;margin-top:3px}
  .opt .mk{font-weight:700;color:var(--teal)}
  textarea.subj{min-height:90px;resize:vertical}
  .q.miss{scroll-margin-top:70px}
  .q.highlight{background:#FFF7E6;border-radius:8px;box-shadow:0 0 0 2px var(--amber);
    transition:box-shadow .3s}
  /* ---- 응시 레이아웃 + 진행 사이드바 ---- */
  .exam-layout{display:flex;gap:18px;align-items:flex-start}
  .exam-main{flex:1;min-width:0}
  .progress-side{width:210px;flex:none;position:sticky;top:78px;
    background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}
  .progress-side h3{font-size:14px;color:var(--navy);margin-bottom:4px}
  .progress-side .pcount{font-size:12px;color:var(--gray);margin-bottom:12px}
  .prog-part{font-size:11px;font-weight:700;color:var(--gray);margin:12px 0 6px}
  .prog-grid{display:flex;flex-wrap:wrap;gap:6px}
  .prog-cell{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);
    background:var(--lgray);color:var(--gray);font-size:13px;font-weight:700;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s}
  .prog-cell:hover{border-color:var(--teal)}
  .prog-cell.done{background:var(--teal);color:#fff;border-color:var(--teal)}
  .prog-legend{display:flex;gap:12px;margin-top:14px;font-size:11px;color:var(--gray)}
  .prog-legend .dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px}
  .prog-legend .dot.d{background:var(--teal)} .prog-legend .dot.u{background:var(--lgray);border:1px solid var(--line)}
  @media(max-width:820px){.exam-layout{flex-direction:column}
    .progress-side{width:100%;position:static;order:-1}}
  /* ---- 결과/표 ---- */
  .scoregrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:8px 0 4px}
  .scorebox{background:var(--lgray);border-radius:10px;padding:14px;text-align:center}
  .scorebox .lab{font-size:12px;color:var(--gray)}
  .scorebox .val{font-size:26px;font-weight:800;color:var(--navy);margin-top:3px}
  .scorebox.total{background:var(--navy)}
  .scorebox.total .lab{color:#C6D5E2}.scorebox.total .val{color:#fff}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 10px;border:1px solid var(--line);text-align:left}
  th{background:var(--navy);color:#fff;font-weight:700}
  tr:nth-child(even) td{background:var(--lgray)}
  .pill{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.wait{background:var(--amber-l);color:#8a6100}
  .pill.active{background:#E7F6EE;color:var(--green)}
  .pill.locked{background:#FBEAE8;color:var(--red)}
  .pill.done{background:var(--teal-l);color:var(--teal)}
  .ans-correct{color:var(--green);font-weight:700}
  .ans-wrong{color:var(--red);font-weight:700}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);
    color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .adminbox{background:var(--amber-l);border:1px solid var(--amber);border-radius:8px;padding:12px;margin-top:10px}
  .adminbox .t{font-size:12px;font-weight:700;color:#8a6100;margin-bottom:6px}
  .expl{font-size:13px;color:var(--gray);margin-top:6px;padding:8px 10px;background:var(--lgray);border-radius:6px}
  .subj-grade{display:flex;gap:8px;align-items:center;margin-top:8px}
  .subj-grade input{max-width:90px}
  .filterbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .filterbar select{max-width:200px}
  /* ---- 통계 보고서 ---- */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:6px 0 8px}
  .kpi{border-radius:12px;padding:16px;text-align:center;border:1px solid var(--line);background:#fff}
  .kpi .lab{font-size:12px;color:var(--gray)}
  .kpi .val{font-size:30px;font-weight:800;color:var(--navy);margin-top:4px;line-height:1.1}
  .kpi .val small{font-size:15px;font-weight:600;color:var(--gray)}
  .kpi.hl{background:var(--navy)} .kpi.hl .lab{color:#C6D5E2} .kpi.hl .val{color:#fff}
  .kpi.good{background:var(--teal-l);border-color:var(--teal)} .kpi.good .val{color:var(--teal)}
  .kpi.warn{background:var(--amber-l);border-color:var(--amber)} .kpi.warn .val{color:#8a6100}
  .bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .bar-row .blab{width:150px;flex:none;color:var(--ink)}
  .bar-track{flex:1;height:20px;background:var(--lgray);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;background:var(--teal);transition:width .4s}
  .bar-fill.low{background:var(--red)} .bar-fill.mid{background:var(--amber)}
  .bar-row .bval{width:66px;flex:none;text-align:right;font-weight:700;color:var(--navy)}
  .rank-num{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--navy);
    color:#fff;font-size:12px;font-weight:700;text-align:center;line-height:22px}
  .print-note{font-size:12px;color:var(--gray);margin-top:4px}
  @media print{header.top,.navbtns,.filterbar,button{display:none!important}
    .card{border:1px solid #ccc;break-inside:avoid}}
  @media(max-width:560px){.container{padding:16px 12px 50px}.card{padding:16px}
    .bar-row .blab{width:110px}}
</style>
</head>
<body>

<!-- ================= 로그인 / 가입 ================= -->
<div id="authView" class="auth-wrap">
  <div class="auth-card">
    <h1>품질 교육 평가 시스템</h1>
    <div class="sub">품질 Mind 및 설계 품질 기본 · 신입사원 평가</div>
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchAuth('login')">로그인</div>
      <div class="tab" id="tabSignup" onclick="switchAuth('signup')">가입 신청</div>
    </div>

    <!-- 로그인 -->
    <div id="loginForm">
      <label>사원번호</label>
      <input id="li_emp" placeholder="예: 240513" autocomplete="username">
      <label>비밀번호</label>
      <input id="li_pw" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      <div class="hint">최초 비밀번호는 사원번호와 같습니다. 로그인 후 변경할 수 있어요.</div>
      <button class="btn full" style="margin-top:16px" onclick="doLogin()">로그인</button>
      <div id="loginMsg"></div>
    </div>

    <!-- 가입 신청 -->
    <div id="signupForm" class="hidden">
      <label>이름</label>
      <input id="su_name" placeholder="홍길동">
      <label>사원번호</label>
      <input id="su_emp" placeholder="예: 240513">
      <label>부서</label>
      <input id="su_dept" placeholder="예: 품질보증팀">
      <label>기수</label>
      <select id="su_cohort"></select>
      <div class="hint">가입 신청 후 관리자 승인이 완료되면 로그인할 수 있습니다.</div>
      <button class="btn full" style="margin-top:16px" onclick="doSignup()">가입 신청</button>
      <div id="signupMsg"></div>
    </div>
  </div>
</div>

<!-- ================= 앱 ================= -->
<div id="appView" class="hidden">
  <header class="top">
    <div class="brand">품질 교육 평가 시스템</div>
    <div class="row" style="align-items:center">
      <span class="who" id="whoami"></span>
      <button class="btn-ghost btn-sm" onclick="openPwChange()">비밀번호 변경</button>
      <button class="btn-ghost btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </header>
  <div class="container">
    <!-- 시험자 네비 -->
    <div id="userNav" class="navbtns hidden">
      <div class="tab active" data-uv="exam" onclick="userTab('exam')">평가 응시</div>
      <div class="tab" data-uv="result" onclick="userTab('result')">내 결과</div>
    </div>
    <!-- 관리자 네비 -->
    <div id="adminNav" class="navbtns hidden">
      <div class="tab active" data-av="approve" onclick="adminTab('approve')">가입 승인</div>
      <div class="tab" data-av="users" onclick="adminTab('users')">계정/기수 관리</div>
      <div class="tab" data-av="results" onclick="adminTab('results')">응시 결과·채점</div>
      <div class="tab" data-av="report" onclick="adminTab('report')">기수 통계 보고서</div>
      <div class="tab" data-av="answers" onclick="adminTab('answers')">정답·해설</div>
    </div>

    <div id="panel"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<!-- ===== Firebase ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc,
  addDoc, query, where, deleteDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =======================================================================
   ① Firebase 설정 — 아래 firebaseConfig를 본인 프로젝트 값으로 교체하세요.
      (Firebase 콘솔 → 프로젝트 설정 → 내 앱 → SDK 설정 및 구성)
   ======================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBXh5dNJgugaK0_g-D7gYircXCkeho7erY",
  authDomain: "quality-quiz-139a1.firebaseapp.com",
  projectId: "quality-quiz-139a1",
  storageBucket: "quality-quiz-139a1.firebasestorage.app",
  messagingSenderId: "613221391379",
  appId: "1:613221391379:web:abc5070ddac947244bf3e6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* Firestore 구조
   users/{empNo}   : {name, empNo, dept, cohort, role:'admin'|'user',
                      status:'wait'|'active'|'locked', password}
   results/{empNo} : {empNo, name, cohort, answers:{q1:..},
                      objScore, subjScores:{q5,q10,q15}, subjAuto:{...},
                      partScores:{p1,p2,p3}, total, submittedAt, graded:bool}
   meta/cohorts    : {list:[...]}
*/

/* ---------- 문항 정의 ---------- */
const QUESTIONS = {
  p1: { title:"Part 1. 품질 경영", sub:"품질의 개념과 업무에서의 중요성", items:[
    { id:"q1", type:"obj", pt:6, stem:"다음 중 이 교육에서 정의한 '품질'의 개념으로 가장 적절한 것은?",
      opts:["생산 속도를 최대한 끌어올려 원가를 낮추는 것",
            "여러 고객의 까다롭고 다양한 제품 요구사항을 충족·만족시키는 것",
            "출하 검사에서 불량을 빠짐없이 걸러내는 것",
            "설계자가 판단하기에 가장 좋은 사양으로 만드는 것"],
      ans:2, expl:"품질은 고객 요구사항(Spec)을 충족·만족시키는 것. 기준은 내 판단이 아니라 고객이다." },
    { id:"q2", type:"obj", pt:6, stem:"'1 : 10 : 100 법칙'에서 각 숫자가 의미하는 비용 단계를 순서대로 바르게 연결한 것은?",
      opts:["예방 → 재작업(사내 검출) → 사외 Claim(고객 검출)",
            "재작업 → 예방 → 사외 Claim",
            "사외 Claim → 재작업 → 예방",
            "검사 → 예방 → 폐기"],
      ans:1, expl:"예방(1)→재작업·사내검출(10)→사외 Claim·고객검출(100). 늦게 잡을수록 비용이 커진다." },
    { id:"q3", type:"obj", pt:6, stem:"COPQ(저품질 비용)의 4가지 분류에 해당하지 않는 것은?",
      opts:["예방 비용","평가/검사 비용","내부 실패 비용","마케팅 비용"],
      ans:4, expl:"COPQ는 예방·평가(검사)·내부 실패·외부 실패 4가지. 마케팅 비용은 포함되지 않는다." },
    { id:"q4", type:"obj", pt:6, stem:"우리 회사가 COPQ를 줄이기 위한 기본 방법으로, 부서와 역할이 잘못 연결된 것은?",
      opts:["연구소 — 설계 표준에 근거해 설계하고 명확한 작업지시서·Spec 제시",
            "제조기술 — 작업지시서와 Spec에 따라 작업, 임의 작업 금지",
            "품질 — 작업지시서 유무와 그에 따른 작업 여부를 현장에서 모니터링",
            "연구소 — 출하 검사에서 최종 불량을 전수 검출"],
      ans:4, expl:"출하 전수 검출은 연구소 역할이 아니다. 연구소는 설계 표준 기반 설계와 Spec 제시가 역할." },
    { id:"q5", type:"subj", pt:8, stem:"'1 : 10 : 100 법칙'이 의미하는 바를 설명하고, 이 법칙이 '품질은 검사가 아니라 설계(예방)에서 만들어진다'는 말과 어떻게 연결되는지 서술하시오.",
      keywords:["예방","설계","고객","비용","100","재작업","클레임","검사"],
      model:"같은 불량이라도 잡는 단계가 늦을수록 비용이 커진다(예방1→재작업10→사외Claim100). 고객에게 넘어간 뒤 잡으면 비용이 폭증하므로, 앞 단계인 설계에서 예방하는 것이 가장 저렴하다. 따라서 품질은 뒤에서 걸러내는 검사가 아니라 앞에서 막는 설계·예방에서 만들어진다." },
  ]},
  p2: { title:"Part 2. 8D Report", sub:"문제 해결 절차와 8D Report의 주요 내용", items:[
    { id:"q6", type:"obj", pt:6, stem:"8D Report에 대한 설명으로 옳지 않은 것은?",
      opts:["문제의 시정조치·재발방지 대책을 세우는 프로세스이자 8단계 보고서이다",
            "예방 기법이 아니라 문제 해결에 집중하기 위한 절차이다",

window.doLogin=async()=>{
  const emp=$("li_emp").value.trim(), pw=$("li_pw").value;
  const msg=$("loginMsg");
  if(!emp||!pw){msg.className="msg err";msg.textContent="사원번호와 비밀번호를 입력하세요.";return;}
  try{
    const d=await getDoc(doc(db,"users",emp));
    if(!d.exists()){msg.className="msg err";msg.textContent="등록되지 않은 사원번호입니다.";return;}
    const u=d.data();
    if(u.password!==pw){msg.className="msg err";msg.textContent="비밀번호가 올바르지 않습니다.";return;}
    if(u.status==="wait"){msg.className="msg err";msg.textContent="아직 승인 대기 중입니다. 관리자 승인 후 로그인하세요.";return;}
    if(u.status==="locked"){msg.className="msg err";msg.textContent="계정이 잠겨 있습니다. 관리자에게 문의하세요.";return;}
    CUR=u; sessionStorage.setItem("cur",JSON.stringify(u));
    enterApp();
  }catch(e){msg.className="msg err";msg.textContent="오류: "+e.message;}
};

async function renderExam(){
  const panel=$("panel");
  const rd=await getDoc(doc(db,"results",CUR.empNo));
  if(rd.exists() && CUR.status!=="active_retake"){
    const r=rd.data();
    if(r.submittedAt && CUR.retake!==true){

        재응시가 필요하면 관리자에게 요청하세요.</div></div>`;
      return;
    }
  }
  let main=`<div class="card"><h2>평가 응시</h2>
    <div class="desc">전체 15문항 · 100점 · 객관식은 자동 채점, 주관식은 관리자 검토 후 확정됩니다.</div>`;

    const pts=P.items.reduce((a,b)=>a+b.pt,0);
    main+=`<div class="part-head"><span>${esc(P.title)} — ${esc(P.sub)}</span><span class="pts">${pts}점</span></div>`;

      main+=`<div class="q" id="qwrap_${q.id}"><div class="stem"><span class="qno">${q.id.slice(1)}.</span> ${esc(q.stem)}
        <span class="pt">(${q.type==='obj'?'객관식':'주관식'} ${q.pt}점)</span></div>`;
      if(q.type==="obj"){
        const marks=["①","②","③","④"];
        q.opts.forEach((o,i)=>{
          main+=`<label class="opt" data-q="${q.id}" onclick="pickOpt(this)">
            <input type="radio" name="${q.id}" value="${i+1}">
            <span class="mk">${marks[i]}</span><span>${esc(o)}</span></label>`;
        });
      }else{
        main+=`<textarea class="subj" id="ta_${q.id}" data-q="${q.id}" oninput="updateProgress()" placeholder="답안을 입력하세요"></textarea>`;
      }
      main+=`</div>`;
    });
  });
  main+=`<button class="btn full btn-navy" style="margin-top:18px" onclick="submitExam()">제출하고 채점하기</button></div>`;

  // 진행 사이드바
  let side=`<div class="progress-side"><h3>풀이 현황</h3>
    <div class="pcount" id="progCount">0 / 15 완료</div>`;
  PARTS.forEach(pk=>{
    const P=QUESTIONS[pk];
    side+=`<div class="prog-part">${esc(P.title.split(".")[0])}. ${esc(P.title.split(". ")[1]||"")}</div><div class="prog-grid">`;
    P.items.forEach(q=>{
      side+=`<div class="prog-cell" id="cell_${q.id}" onclick="jumpTo('${q.id}')">${q.id.slice(1)}</div>`;
    });
    side+=`</div>`;

    <span><span class="dot u"></span>미완료</span></div>

window.pickOpt=(el)=>{
  document.querySelectorAll(`.opt[data-q="${el.dataset.q}"]`).forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel'); el.querySelector('input').checked=true;
  updateProgress();
};
/* 진행 현황 갱신 */
window.updateProgress=()=>{
  let done=0;
  PARTS.forEach(pk=>QUESTIONS[pk].items.forEach(q=>{
    let filled=false;
    if(q.type==="obj") filled=!!document.querySelector(`input[name="${q.id}"]:checked`);
    else{const ta=$("ta_"+q.id);filled=ta && ta.value.trim()!=="";}
    const cell=$("cell_"+q.id); if(cell) cell.classList.toggle("done",filled);
    if(filled) done++;
  }));
  const c=$("progCount"); if(c) c.textContent=`${done} / 15 완료`;
};

window.jumpTo=(qid)=>{
  const el=$("qwrap_"+qid); if(!el) return;
  el.scrollIntoView({behavior:"smooth",block:"start"});
  el.classList.add("highlight");
  setTimeout(()=>el.classList.remove("highlight"),1400);
};

/* ---------- 주관식 1차 자동채점 (키워드 기반) ---------- */
function autoGradeSubj(q,text){
  if(!text||!text.trim()) return 0;
  const t=text.replace(/\s/g,"").toLowerCase();
  let hit=0;
  q.keywords.forEach(k=>{ if(t.includes(k.toLowerCase())) hit++; });
  const ratio=hit/q.keywords.length;
  // 배점 비율로 환산 후 0.5점 단위 반올림
  let sc=Math.round(q.pt*ratio*2)/2;
  return Math.min(sc,q.pt);
}

window.submitExam=async()=>{
  const answers={}; let objScore=0; const partScores={p1:0,p2:0,p3:0};
  const subjAuto={}, subjScores={};
  // 미응답 체크 (첫 미응답 문항 id 기록)
  let unanswered=0, firstMiss=null;
  PARTS.forEach(pk=>QUESTIONS[pk].items.forEach(q=>{
    if(q.type==="obj"){
      const sel=document.querySelector(`input[name="${q.id}"]:checked`);
      const v=sel?Number(sel.value):null; answers[q.id]=v;
      if(v===null){unanswered++; if(!firstMiss)firstMiss=q.id;}
      if(v===q.ans){objScore+=q.pt;partScores[pk]+=q.pt;}
    }else{
      const txt=$("ta_"+q.id).value.trim(); answers[q.id]=txt;
      if(!txt){unanswered++; if(!firstMiss)firstMiss=q.id;}
      const a=autoGradeSubj(q,txt); subjAuto[q.id]=a; subjScores[q.id]=a;
      partScores[pk]+=a;
    }
  }));
  if(unanswered>0){
    // 미응답이 있으면 먼저 첫 미응답 문항으로 이동해 보여준다
    if(firstMiss) jumpTo(firstMiss);
    if(!confirm(`아직 작성하지 않은 문항이 ${unanswered}개 있습니다.\n(오른쪽 현황에서 미완료 번호를 확인하세요)\n그래도 제출할까요?`)) return;
  }
  const total=objScore+Object.values(subjScores).reduce((a,b)=>a+b,0);
  const rec={empNo:CUR.empNo,name:CUR.name,dept:CUR.dept,cohort:CUR.cohort,
    answers,objScore,subjAuto,subjScores,partScores,total,
    graded:false, submittedAt:new Date().toISOString()};
  await setDoc(doc(db,"results",CUR.empNo),rec);
  // 재응시 플래그 해제
  await updateDoc(doc(db,"users",CUR.empNo),{retake:false}).catch(()=>{});
  CUR.retake=false; sessionStorage.setItem("cur",JSON.stringify(CUR));
  toast("제출 완료! 채점 결과를 확인하세요.");
  userTab('result');
};

window.confirmGrade=async(emp)=>{
  const rd=await getDoc(doc(db,"results",emp));const r=rd.data();
  const subjScores={...r.subjScores};let subjTotal=0;
  const partScores={p1:0,p2:0,p3:0};
  // 객관식 재계산
  PARTS.forEach(pk=>QUESTIONS[pk].items.forEach(q=>{
    if(q.type==="obj"){ if(r.answers[q.id]===q.ans) partScores[pk]+=q.pt; }
  }));
  // 주관식 입력값 반영
  PARTS.forEach(pk=>QUESTIONS[pk].items.forEach(q=>{
    if(q.type==="subj"){
      let v=parseFloat($("sg_"+q.id).value);if(isNaN(v))v=0;v=Math.max(0,Math.min(v,q.pt));
      subjScores[q.id]=v;subjTotal+=v;partScores[pk]+=v;
    }
  }));
  const objScore=PARTS.reduce((a,pk)=>a+QUESTIONS[pk].items.reduce((s,q)=>s+(q.type==='obj'&&r.answers[q.id]===q.ans?q.pt:0),0),0);
  const total=objScore+subjTotal;
  await updateDoc(doc(db,"results",emp),{subjScores,partScores,objScore,total,graded:true});
  toast("채점 확정 저장 완료");adminTab('results');
};

async function renderReport(){
  const panel=$("panel");
  const snap=await getDocs(collection(db,"results"));
  const all=[]; snap.forEach(d=>all.push(d.data()));
  const cohortSet=[...new Set(all.map(r=>r.cohort))].sort();
  if(window._repF===undefined) window._repF = cohortSet[0] || "";
  const f=window._repF;
  const rows=all.filter(r=>r.cohort===f);

  const filter=`<div class="filterbar"><label style="margin:0">기수 선택</label>
    <select id="repFilter">
      ${cohortSet.map(c=>`<option ${f===c?'selected':''}>${esc(c)}</option>`).join("")}
    </select>
    <button class="btn-ghost btn-sm" onclick="window.print()">인쇄 / PDF 저장</button>
    </div>`;

  if(!cohortSet.length){
    panel.innerHTML=`<div class="card"><h2>기수 통계 보고서</h2>
      <div class="desc">아직 응시 결과가 없습니다.</div></div>`; return;
  }
  if(!rows.length){
    panel.innerHTML=`<div class="card"><h2>기수 통계 보고서</h2>${filter}
      <div class="expl">「${esc(f)}」 기수의 응시 결과가 없습니다.</div></div>`;
    bindRepFilter(); return;
  }

  // ---- 집계 ----
  const n=rows.length;
  const totals=rows.map(r=>r.total);
  const avg=(arr)=>arr.reduce((a,b)=>a+b,0)/arr.length;
  const mean=avg(totals);
  const max=Math.max(...totals), min=Math.min(...totals);
  const PASS=60;
  const passCnt=totals.filter(t=>t>=PASS).length;
  const passRate=Math.round(passCnt/n*100);
  const gradedCnt=rows.filter(r=>r.graded).length;

  // 파트별 평균 (만점 대비)
  const partMax={p1:32,p2:36,p3:32};
  const partAvg={
    p1:avg(rows.map(r=>r.partScores.p1||0)),
    p2:avg(rows.map(r=>r.partScores.p2||0)),
    p3:avg(rows.map(r=>r.partScores.p3||0)),
  };
  const partName={p1:"Part 1 · 품질경영",p2:"Part 2 · 8D Report",p3:"Part 3 · ESD"};

  // 문항별 정답률 (객관식만) — 취약 문항 파악
  const qStat=[];
  PARTS.forEach(pk=>QUESTIONS[pk].items.forEach(q=>{
    if(q.type!=="obj")return;
    let correct=0;
    rows.forEach(r=>{ if(r.answers && r.answers[q.id]===q.ans) correct++; });
    qStat.push({id:q.id,part:pk,stem:q.stem,rate:Math.round(correct/n*100)});
  }));
  const weak=[...qStat].sort((a,b)=>a.rate-b.rate).slice(0,3);

  // 점수 분포 구간
  const bands=[["90–100",90,100],["80–89",80,89],["70–79",70,79],["60–69",60,69],["60 미만",0,59]];
  const dist=bands.map(([lab,lo,hi])=>({lab,cnt:totals.filter(t=>t>=lo&&t<=hi).length}));

  // 개인 순위표
  const ranked=[...rows].sort((a,b)=>b.total-a.total);

  const barClass=(pct)=>pct>=75?"":pct>=50?"mid":"low";

  let html=`<div class="card"><h2>기수 통계 보고서</h2>
    <div class="desc">「${esc(f)}」 종합 평가 결과 · 관리자 전용</div>${filter}

    <div class="kpi-grid">
      <div class="kpi hl"><div class="lab">응시 인원</div><div class="val">${n}<small> 명</small></div></div>
      <div class="kpi"><div class="lab">평균 점수</div><div class="val">${mean.toFixed(1)}<small> /100</small></div></div>
      <div class="kpi good"><div class="lab">최고 점수</div><div class="val">${max}</div></div>
      <div class="kpi warn"><div class="lab">최저 점수</div><div class="val">${min}</div></div>
      <div class="kpi"><div class="lab">합격률 (60점↑)</div><div class="val">${passRate}<small> %</small></div></div>
    </div>
    <div class="print-note">채점 확정 ${gradedCnt}/${n}명 · 주관식 미확정 응시자는 자동채점 점수가 반영되어 있습니다.</div>
  </div>`;

  // 파트별 평균
  html+=`<div class="card"><h2>파트별 평균 (만점 대비)</h2>
    <div class="desc">어느 영역이 강하고 약한지 한눈에 봅니다.</div>`;
  PARTS.forEach(pk=>{
    const pct=Math.round(partAvg[pk]/partMax[pk]*100);
    html+=`<div class="bar-row">
      <span class="blab">${esc(partName[pk])}</span>
      <div class="bar-track"><div class="bar-fill ${barClass(pct)}" style="width:${pct}%"></div></div>
      <span class="bval">${partAvg[pk].toFixed(1)}/${partMax[pk]}</span></div>`;
  });
  html+=`</div>`;

  // 점수 분포
  html+=`<div class="card"><h2>점수 분포</h2>`;
  const maxBand=Math.max(...dist.map(d=>d.cnt),1);
  dist.forEach(d=>{
    const pct=Math.round(d.cnt/maxBand*100);
    html+=`<div class="bar-row">
      <span class="blab">${d.lab}점</span>
      <div class="bar-track"><div class="bar-fill" style="width:${d.cnt?Math.max(pct,6):0}%"></div></div>
      <span class="bval">${d.cnt}명</span></div>`;
  });
  html+=`</div>`;

  // 취약 문항 (객관식 정답률 하위 3)
  html+=`<div class="card"><h2>취약 문항 TOP 3 (객관식 정답률 하위)</h2>
    <div class="desc">보충 교육이 필요한 항목입니다.</div>
    <table><thead><tr><th>문항</th><th>내용</th><th>정답률</th></tr></thead><tbody>`;
  weak.forEach(w=>{
    const cls=w.rate<50?"ans-wrong":"";
    html+=`<tr><td>${w.id.slice(1)}번</td><td>${esc(w.stem.slice(0,42))}${w.stem.length>42?"…":""}</td>
      <td class="${cls}"><b>${w.rate}%</b></td></tr>`;
  });
  html+=`</tbody></table></div>`;

  // 전체 문항 정답률
  html+=`<div class="card"><h2>문항별 정답률 (객관식 전체)</h2>`;
  qStat.forEach(q=>{
    html+=`<div class="bar-row">
      <span class="blab">${q.id.slice(1)}번</span>
      <div class="bar-track"><div class="bar-fill ${barClass(q.rate)}" style="width:${q.rate}%"></div></div>
      <span class="bval">${q.rate}%</span></div>`;
  });
  html+=`</div>`;

  // 개인 순위표
  html+=`<div class="card"><h2>개인별 결과 (총점순)</h2>
    <table><thead><tr><th>순위</th><th>이름</th><th>사번</th><th>P1</th><th>P2</th><th>P3</th><th>총점</th><th>합격</th><th>상태</th></tr></thead><tbody>`;
  ranked.forEach((r,i)=>{
    const pass=r.total>=PASS?`<span class="pill active">합격</span>`:`<span class="pill locked">재교육</span>`;
    const st=r.graded?`<span class="pill done">확정</span>`:`<span class="pill wait">대기</span>`;
    html+=`<tr><td><span class="rank-num">${i+1}</span></td><td>${esc(r.name)}</td><td>${esc(r.empNo)}</td>
      <td>${r.partScores.p1}</td><td>${r.partScores.p2}</td><td>${r.partScores.p3}</td>
      <td><b>${r.total}</b></td><td>${pass}</td><td>${st}</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  panel.innerHTML=html;
  bindRepFilter();
}
function bindRepFilter(){
  const sel=$("repFilter");
  if(sel) sel.onchange=()=>{window._repF=sel.value;renderReport();};
}

function renderAnswers(){
  const panel=$("panel");
  let html=`<div class="card"><h2>정답 · 해설 (관리자 전용)</h2>
    <div class="desc">시험자에게는 노출되지 않습니다.</div>`;
  PARTS.forEach(pk=>{
    const P=QUESTIONS[pk];
    html+=`<div class="part-head"><span>${esc(P.title)}</span></div>`;
    P.items.forEach(q=>{
      const marks=["①","②","③","④"];
      html+=`<div class="q"><div class="stem"><span class="qno">${q.id.slice(1)}.</span> ${esc(q.stem)}
        <span class="pt">(${q.type==='obj'?'객관식':'주관식'} ${q.pt}점)</span></div>`;
      if(q.type==="obj"){
        html+=`<div>정답: <span class="ans-correct">${marks[q.ans-1]} ${esc(q.opts[q.ans-1])}</span></div>
          <div class="expl">${esc(q.expl)}</div>`;
      }else{
        html+=`<div class="expl"><b>모범답안:</b> ${esc(q.model)}</div>`;
      }
      html+=`</div>`;
    });
  });
  html+=`</div>`;
  panel.innerHTML=html;
}

    await loadCohorts();
    const saved=sessionStorage.getItem("cur");
    if(saved){
      // 세션 복원 시 최신 상태 재확인
      const u=JSON.parse(saved);
      const d=await getDoc(doc(db,"users",u.empNo));
      if(d.exists()&&d.data().status!=="locked"){CUR=d.data();enterApp();}
      else sessionStorage.removeItem("cur");
    }
  }catch(e){
    console.error(e);
    $("loginMsg").className="msg err";
    $("loginMsg").textContent="Firebase 연결 오류: 설정값(firebaseConfig)과 보안 규칙을 확인하세요.";
  }
})();
